name: CI — build and push images

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push vote image
        uses: docker/build-push-action@v5
        with:
          context: ./vote
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/vote:${{ github.sha }}

      - name: Build and push result image
        uses: docker/build-push-action@v5
        with:
          context: ./result
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/result:${{ github.sha }}

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/worker:${{ github.sha }}

      - name: Update Kubernetes manifests with new image tags
        run: |
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/vote:.*|image: ${{ secrets.DOCKER_USERNAME }}/vote:${{ github.sha }}|" k8s/vote-deployment.yaml
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/result:.*|image: ${{ secrets.DOCKER_USERNAME }}/result:${{ github.sha }}|" k8s/result-deployment.yaml
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/worker:.*|image: ${{ secrets.DOCKER_USERNAME }}/worker:${{ github.sha }}|" k8s/worker-deployment.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git commit -m "ci: update image tags to ${{ github.sha }}" || echo "No changes to commit"
          git push
